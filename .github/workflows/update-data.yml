name: Refresh World Cup data and media

# Refreshes news, stats, match-specific FIFA videos, player media and venue
# photography. Changed overlays are committed and then published to the
# Cloudflare Workers static-assets deployment.
#
# Required repository secrets for publishing:
#   CLOUDFLARE_API_TOKEN — token with Edit Cloudflare Workers permission
#   CLOUDFLARE_ACCOUNT_ID — the Cloudflare account id

on:
  schedule:
    # Twice hourly keeps normal GitHub scheduler delays comfortably below the
    # two-hour freshness target.
    - cron: '17,47 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: knockout-circle-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check FIFA videos, player media and venue photography
        continue-on-error: true
        run: node scripts/update-data.mjs

      - name: Commit and push refreshed overlays
        id: commit
        run: |
          if git diff --quiet -- data; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No media changes found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore(data): refresh World Cup data and media"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Publish to Cloudflare Workers
        if: ${{ steps.commit.outputs.changed == 'true' && env.CLOUDFLARE_API_TOKEN != '' }}
        run: npx --yes wrangler deploy

      - name: Note if deploy was skipped
        if: ${{ steps.commit.outputs.changed == 'true' && env.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "::warning::Data was refreshed and committed, but CLOUDFLARE_API_TOKEN is not configured, so the live site was not published."
